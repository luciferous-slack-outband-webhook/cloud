on:
  push:
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".idea/**"
      - ".gitignore"
    branches:
      - "master"
    tags:
      - "v*"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".idea/**"
      - ".gitignore"
    branches:
      - "master"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-22.04
    steps:
      - name: Add Mask
        run: |
          echo "::add-mask::${{ secrets.ACCOUNT_ID }}"
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN_GITHUB_ACTION }}
          aws-region: ${{ vars.REGION }}
      - run: make terraform-init
        env:
          BACKEND_S3_BUCKET: ${{ secrets.TERRAFORM_BACKEND_S3_BUCKET }}
          BACKEND_S3_KEY: ${{ vars.TERRAFORM_BACKEND_S3_KEY }}
          BACKEND_REGION: ${{ vars.REGION }}
      - name: terraform apply
        if: ${{ github.ref_type == 'tag' }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
          TF_VAR_REGION: ${{ vars.REGION }}
          TF_VAR_SLACK_INCOMING_WEBHOOK_ERROR_NOTIFIER_01: ${{ secrets.SLACK_INCOMING_WEBHOOK_ERROR_NOTIFIER_01 }}
          TF_VAR_SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      - name: terraform plan
        if: ${{ github.ref_type == 'branch' }}
        run: terraform plan
        env:
          TF_VAR_SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
          TF_VAR_REGION: ${{ vars.REGION }}
          TF_VAR_SLACK_INCOMING_WEBHOOK_ERROR_NOTIFIER_01: ${{ secrets.SLACK_INCOMING_WEBHOOK_ERROR_NOTIFIER_01 }}
          TF_VAR_SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
      - name: terraform output
        run: terraform output

