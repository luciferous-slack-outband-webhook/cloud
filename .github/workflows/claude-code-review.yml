name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRをレビューしてください。

            ## 前提: 過去のレビューコメントの確認
            レビューを開始する前に、まず以下のコマンドで過去のレビューコメントとその返信を確認してください：

            1. PRのレビューコメント一覧を取得:
               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments

            2. PRの一般コメント一覧を取得:
               gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments

            3. PRのレビュー一覧を取得:
               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews

            過去のレビューで指摘された問題が修正されているか確認し、同じ指摘を繰り返さないようにしてください。
            まだ対応されていない過去の指摘があれば、その旨をコメントに含めてください。

            ## レビュー観点
            以下の観点でチェックし、レビューコメントを投稿してください：
            - コード品質とベストプラクティス
            - 潜在的なバグや問題
            - セキュリティへの影響
            - パフォーマンス上の考慮事項
          claude_args: "--allowedTools Bash(gh:*) Read Glob Grep"

